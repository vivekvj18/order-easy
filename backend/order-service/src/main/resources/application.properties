spring.application.name=order-service

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/ordereasy_order_db
spring.datasource.username=spring_user
spring.datasource.password=Spring@2024

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Port
server.port=8083

spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.properties.spring.json.trusted.packages=*

# Inventory Service base URL for OpenFeign
inventory.service.url=http://localhost:8086

# Delivery Service base URL for OpenFeign
delivery.service.url=http://localhost:8087