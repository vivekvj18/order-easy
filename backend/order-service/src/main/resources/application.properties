spring.application.name=order-service
server.port=8083

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/ordereasy_order_db?createDatabaseIfNotExist=true
spring.datasource.username=spring_user
spring.datasource.password=Spring@2024

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=order-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Feign URLs (Keeping for reference, but removing from clients)
inventory.service.url=http://localhost:8086
delivery.service.url=http://localhost:8087
cart.service.url=http://localhost:8085

# Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}
eureka.client.healthcheck.enabled=true
management.endpoints.web.exposure.include=health

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true