spring.application.name=cart-service
server.port=8085

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/ordereasy_cart_db?createDatabaseIfNotExist=true
spring.datasource.username=spring_user
spring.datasource.password=Spring@2024
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}
eureka.client.healthcheck.enabled=true
management.endpoints.web.exposure.include=health

# OpenAPI/Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Feign Timeouts (Fix 1)
feign.client.config.default.connectTimeout=3000
feign.client.config.default.readTimeout=5000

# Enable Feign Circuit Breaker
spring.cloud.openfeign.circuitbreaker.enabled=true

# Resilience4j Circuit Breaker Config (Fix 5 - Naming)
# Note: After waitDuration, circuit transitions to HALF-OPEN to allow limited test requests
resilience4j.circuitbreaker.instances.productServiceCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.productServiceCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.productServiceCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.productServiceCB.permittedNumberOfCallsInHalfOpenState=3

# Metrics Visibility: /actuator/metrics/resilience4j.circuitbreaker.calls
# This allows monitoring OPEN/CLOSED transitions and failure rates.

# Metrics & Health
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
