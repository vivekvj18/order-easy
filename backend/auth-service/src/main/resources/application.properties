spring.application.name=auth-service
server.port=8081

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/ordereasy_auth_db?createDatabaseIfNotExist=true
spring.datasource.username=spring_user
spring.datasource.password=Spring@2024
spring.jpa.hibernate.ddl-auto=update

# Twilio
twilio.account-sid=${TWILIO_ACCOUNT_SID:ACxxx}
twilio.auth-token=${TWILIO_AUTH_TOKEN:xxx}
twilio.verify-service-sid=${TWILIO_VERIFY_SERVICE_SID:VAxxx}

# JWT
jwt.secret=mysecretkeymysecretkeymysecretkeymysecretkeymysecretkey

# Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}
eureka.client.healthcheck.enabled=true
management.endpoints.web.exposure.include=health